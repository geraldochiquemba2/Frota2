components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginRequest:
      type: object
      properties:
        phone:
          type: string
        pin:
          type: string
      required: [phone, pin]

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required: [user, message]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [admin, driver]
        active:
          type: boolean
        vehicleId:
          type: integer
          nullable: true
        createdAt:
          type: string
      required: [id, name, phone, role, active, createdAt]

    CreateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        pin:
          type: string
        role:
          type: string
          enum: [admin, driver]
        vehicleId:
          type: integer
          nullable: true
      required: [name, phone, pin, role]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        pin:
          type: string
        role:
          type: string
          enum: [admin, driver]
        vehicleId:
          type: integer
          nullable: true
        active:
          type: boolean

    Vehicle:
      type: object
      properties:
        id:
          type: integer
        plate:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        status:
          type: string
          enum: [active, maintenance, inactive]
        mileage:
          type: number
        fuelType:
          type: string
        assignedDriverId:
          type: integer
          nullable: true
        assignedDriverName:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, plate, brand, model, year, status, mileage, fuelType, createdAt]

    CreateVehicleRequest:
      type: object
      properties:
        plate:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        status:
          type: string
          enum: [active, maintenance, inactive]
        mileage:
          type: number
        fuelType:
          type: string
        assignedDriverId:
          type: integer
          nullable: true
      required: [plate, brand, model, year, status, mileage, fuelType]

    UpdateVehicleRequest:
      type: object
      properties:
        plate:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        status:
          type: string
          enum: [active, maintenance, inactive]
        mileage:
          type: number
        fuelType:
          type: string
        assignedDriverId:
          type: integer
          nullable: true

    Trip:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        origin:
          type: string
        destination:
          type: string
        scheduledStart:
          type: string
        scheduledEnd:
          type: string
          nullable: true
        actualStart:
          type: string
          nullable: true
        actualEnd:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        driverId:
          type: integer
          nullable: true
        driverName:
          type: string
          nullable: true
        vehicleId:
          type: integer
          nullable: true
        vehiclePlate:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        distance:
          type: number
          nullable: true
        startMileage:
          type: number
          nullable: true
        endMileage:
          type: number
          nullable: true
        createdAt:
          type: string
      required: [id, title, origin, destination, scheduledStart, status, createdAt]

    CreateTripRequest:
      type: object
      properties:
        title:
          type: string
        origin:
          type: string
        destination:
          type: string
        scheduledStart:
          type: string
        scheduledEnd:
          type: string
          nullable: true
        driverId:
          type: integer
          nullable: true
        vehicleId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        distance:
